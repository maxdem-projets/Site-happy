name: Daily Parallel Update

on:
  schedule:
    # S'exécute tous les jours à 06:00 UTC (08:00 heure française en été, 07:00 en hiver)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permet de lancer le workflow manuellement depuis l'interface GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch and rewrite daily news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node cron-fetch.js

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.js
          # Ne commit que s'il y a des changements (pour éviter de faire échouer le build s'il n'y a pas d'article)
          git diff-index --quiet HEAD || git commit -m "chore: mise à jour quotidienne des actualités positives [skip ci]"
          git push
